<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Materials</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/frontend/css/styles.css" />
  </head>
  <body data-page="materials">
    <nav class="navbar navbar-expand-lg navbar-dark app-navbar shadow-sm">
      <div class="container">
        <a class="navbar-brand fw-semibold" href="/">PVC Formulation ERP</a>
        <div class="navbar-nav app-nav-links ms-auto gap-2">
          <a class="nav-link" href="/">Dashboard</a>
          <a class="nav-link" href="/add-formulation">Add Formulation</a>
          <a class="nav-link active" href="/materials-page">Materials</a>
        </div>
      </div>
    </nav>

    <main class="container py-4">
      <div class="row g-4">
        <div class="col-lg-4">
          <section class="panel-card p-4">
            <div class="d-flex justify-content-between align-items-center gap-3 mb-3 section-header-wrap">
              <h1 id="materialFormTitle" class="h4 mb-0">Add Material</h1>
              <button id="cancelMaterialEdit" type="button" class="btn btn-outline-secondary btn-sm d-none">Cancel Edit</button>
            </div>
            <div id="materialsAlert" class="alert d-none" role="alert"></div>
            <form id="materialForm" class="row g-3">
              <div class="col-12">
                <label for="materialName" class="form-label">Name</label>
                <input id="materialName" class="form-control" required />
              </div>
              <div class="col-12">
                <label for="unitPrice" class="form-label">Unit Price</label>
                <input id="unitPrice" type="number" step="0.01" min="0" class="form-control" required />
              </div>
              <div class="col-6">
                <label for="gst" class="form-label">GST %</label>
                <input id="gst" type="number" step="0.01" min="0" class="form-control" required />
              </div>
              <div class="col-6">
                <label for="extra" class="form-label">Extra</label>
                <input id="extra" type="number" step="0.01" class="form-control" value="0" required />
              </div>
              <div class="col-12">
                <button id="materialSubmitButton" type="submit" class="btn btn-primary w-100">Save Material</button>
              </div>
            </form>
          </section>
        </div>

        <div class="col-lg-8">
          <section class="panel-card p-4">
            <div class="d-flex justify-content-between align-items-center gap-3 mb-4 section-header-wrap">
              <div>
                <h2 class="h4 mb-1">Materials List</h2>
                <p class="text-muted mb-0">Material costs with auto-calculated amount per kg.</p>
              </div>
              <div class="form-check form-switch">
                <input class="form-check-input" type="checkbox" role="switch" id="showArchivedMaterials" />
                <label class="form-check-label" for="showArchivedMaterials">Show Archived</label>
              </div>
            </div>

            <div id="materialsLoader" class="text-center py-5 d-none">
              <div class="spinner-border text-primary" role="status"></div>
              <p class="mt-3 text-muted mb-0">Loading materials...</p>
            </div>

            <div class="table-responsive">
              <table class="table align-middle">
                <thead>
                  <tr>
                    <th>Name</th>
                    <th>Unit Price</th>
                    <th>GST</th>
                    <th>Extra</th>
                    <th>Amount / Kg</th>
                    <th></th>
                  </tr>
                </thead>
                <tbody id="materialsTableBody">
                  <tr>
                    <td colspan="6" class="text-center text-muted py-5">No materials found.</td>
                  </tr>
                </tbody>
              </table>
            </div>
          </section>
        </div>
      </div>
    </main>

    <script src="/frontend/js/common.js"></script>
    <script src="/frontend/js/api.js"></script>
    <script src="/frontend/js/materials.js"></script>
  </body>
</html>
