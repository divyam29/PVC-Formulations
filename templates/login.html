{% extends "base.html" %}

{% block head %}
  <style>
    :root {
      color-scheme: light;
      --bg: #eef2f6;
      --surface: rgba(255, 255, 255, 0.9);
      --line: rgba(18, 32, 51, 0.08);
      --line-strong: rgba(18, 32, 51, 0.12);
      --text-main: #142033;
      --text-soft: #627087;
      --primary: #0f4c81;
      --shadow: 0 20px 56px rgba(15, 30, 56, 0.1);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 1.25rem;
      color: var(--text-main);
      background:
        radial-gradient(circle at top right, rgba(111, 177, 255, 0.2), transparent 24%),
        radial-gradient(circle at bottom left, rgba(15, 76, 129, 0.08), transparent 28%),
        linear-gradient(180deg, #f5f8fb 0%, var(--bg) 100%);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    .login-shell { width: min(100%, 420px); }

    .login-card {
      border-radius: 28px;
      background: var(--surface);
      border: 1px solid var(--line);
      box-shadow: var(--shadow);
      backdrop-filter: blur(18px);
      padding: 2rem;
    }

    .login-card h2 {
      margin: 0 0 0.45rem;
      font-size: 1.7rem;
      letter-spacing: -0.03em;
    }

    .login-card p {
      margin: 0 0 1.4rem;
      color: var(--text-soft);
      line-height: 1.65;
    }

    .error {
      display: none;
      margin-bottom: 1rem;
      padding: 0.9rem 1rem;
      border-radius: 14px;
      background: #fff1f2;
      border: 1px solid #fecdd3;
      color: #9f1239;
    }

    label {
      display: block;
      margin-bottom: 0.45rem;
      font-weight: 600;
    }

    input {
      width: 100%;
      min-height: 48px;
      margin-bottom: 1rem;
      padding: 0.8rem 0.9rem;
      border-radius: 14px;
      border: 1px solid var(--line-strong);
      background: rgba(255, 255, 255, 0.94);
      color: var(--text-main);
      font: inherit;
    }

    input:focus {
      outline: none;
      border-color: rgba(15, 76, 129, 0.38);
      box-shadow: 0 0 0 4px rgba(15, 76, 129, 0.1);
    }

    button {
      width: 100%;
      min-height: 48px;
      border: 0;
      border-radius: 14px;
      background: linear-gradient(135deg, var(--primary), #17609d);
      color: #fff;
      font: inherit;
      font-weight: 700;
      cursor: pointer;
    }

    button:disabled {
      opacity: 0.75;
      cursor: wait;
    }

    .login-note {
      margin-top: 0.9rem;
      color: var(--text-soft);
      font-size: 0.92rem;
      line-height: 1.55;
    }

    @media (max-width: 991px) {
      .login-card {
        padding: 1.4rem;
        border-radius: 22px;
      }
    }

    @media (max-width: 575px) {
      body { padding: 0.8rem; }
      .login-card {
        padding: 1.1rem;
        border-radius: 18px;
      }
    }
  </style>
{% endblock %}

{% block content %}
  <main class="login-shell">
    <section class="login-card">
      <h2>Login</h2>
      <p>Use your configured superuser credentials to continue.</p>
      <div id="error" class="error"></div>
      <form id="loginForm">
        <label for="username">Username</label>
        <input id="username" autocomplete="username" required />

        <label for="password">Password</label>
        <input id="password" type="password" autocomplete="current-password" required />

        <button id="loginButton" type="submit">Login</button>
      </form>
      <div class="login-note">
        This session is stored securely in your browser and is required to access any app content.
      </div>
    </section>
  </main>
{% endblock %}

{% block scripts %}
  <script>
    const form = document.getElementById("loginForm");
    const error = document.getElementById("error");
    const loginButton = document.getElementById("loginButton");

    form.addEventListener("submit", async (event) => {
      event.preventDefault();
      error.style.display = "none";
      error.textContent = "";
      loginButton.disabled = true;
      loginButton.textContent = "Signing in...";

      const payload = {
        username: document.getElementById("username").value.trim(),
        password: document.getElementById("password").value
      };

      try {
        const response = await fetch("/login", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(payload)
        });

        if (!response.ok) {
          const data = await response.json().catch(() => ({ detail: "Login failed." }));
          error.textContent = data.detail || "Login failed.";
          error.style.display = "block";
          return;
        }

        window.location.assign("/");
      } finally {
        loginButton.disabled = false;
        loginButton.textContent = "Login";
      }
    });
  </script>
{% endblock %}
